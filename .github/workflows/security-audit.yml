name: Security audit
on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:
permissions:
  contents: read
  security-events: write
jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true
